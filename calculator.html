<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
</head>
<body>
    <h2>Simple Calculator</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">

    <br><br>

    <button onclick="calculate('add')">Add</button>
    <button onclick="calculate('sub')">Subtract</button>
    <button onclick="calculate('mul')">Multiply</button>
    <button onclick="calculate('div')">Divide</button>

    <h3 id="result"></h3>

    <script>
        async function calculate(operation) {
            const num1 = document.getElementById("num1").value;
            const num2 = document.getElementById("num2").value;

            const response = await fetch(`http://localhost:3000/${operation}?num1=${num1}&num2=${num2}`);
            const data = await response.json();

            document.getElementById("result").innerText = "Result: " + data.result;
        }
    </script>
</body>
</html>
