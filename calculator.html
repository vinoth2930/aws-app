<!DOCTYPE html>
<html>
<head>
    <title>Modern Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            width: 70px;
            height: 45px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .add { background: #4CAF50; color: white; }
        .sub { background: #f44336; color: white; }
        .mul { background: #2196F3; color: white; }
        .div { background: #ff9800; color: white; }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Calculator</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">

    <div class="buttons">
        <button class="add" onclick="calculate('add')">+</button>
        <button class="sub" onclick="calculate('sub')">-</button>
        <button class="mul" onclick="calculate('mul')">×</button>
        <button class="div" onclick="calculate('div')">÷</button>
    </div>

    <div id="result">Result: </div>
</div>

<script>
async function calculate(operation) {
    try {
        const num1 = document.getElementById("num1").value;
        const num2 = document.getElementById("num2").value;

        const response = await fetch(`/${operation}?num1=${num1}&num2=${num2}`);
        const data = await response.json();

        document.getElementById("result").innerText = "Result: " + data.result;
    } catch (err) {
        document.getElementById("result").innerText = "Error!";
    }
}
</script>

</body>
</html>
